name: assetlife_mobile
description: "AssetLife Mobile App - Asset Lifecycle Management Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.5
  
  # API & HTTP
  dio: ^5.3.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Internationalization & Date Formatting
  intl: ^0.19.0
  
  # Navigation & Routing
  go_router: ^13.0.0

  # External URL launch
  url_launcher: ^6.3.0

  # Deep links
  app_links: ^3.4.5

  # Charts
  fl_chart: ^0.69.0

  # PDF preview
  syncfusion_flutter_pdfviewer: ^27.2.5

  # SVG assets
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_logo.png
    - assets/images/login-bg.svg
    - assets/background/

  # Fonts (optional for future use)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo.png"
  adaptive_icon_foreground: "assets/icons/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "assets/icons/app_logo.png"
  remove_alpha_ios: true
