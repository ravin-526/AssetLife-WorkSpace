<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:0.15" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#ffffff" opacity="0.98" />
  <rect width="1920" height="1080" fill="url(#bgGradient)" />

  <!-- Decorative Elements - Subtle Asset Icons -->
  
  <!-- Top Right - Laptop -->
  <g opacity="0.08" transform="translate(1650, 80)">
    <rect x="0" y="20" width="180" height="120" rx="8" fill="none" stroke="#1a202c" stroke-width="8"/>
    <rect x="20" y="30" width="140" height="80" rx="4" fill="none" stroke="#1a202c" stroke-width="4"/>
    <path d="M 30 110 L 150 110 M 50 110 L 50 125 M 130 110 L 130 125" stroke="#1a202c" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Middle Left - Document/Invoice -->
  <g opacity="0.07" transform="translate(80, 350)">
    <rect x="0" y="0" width="140" height="180" rx="4" fill="none" stroke="#1a202c" stroke-width="6"/>
    <line x1="20" y1="30" x2="120" y2="30" stroke="#1a202c" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="50" x2="120" y2="50" stroke="#1a202c" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="100" y2="70" stroke="#1a202c" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="100" x2="120" y2="100" stroke="#1a202c" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="130" x2="120" y2="130" stroke="#1a202c" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Bottom Right - Mobile Device -->
  <g opacity="0.08" transform="translate(1700, 750)">
    <rect x="0" y="0" width="100" height="160" rx="12" fill="none" stroke="#1a202c" stroke-width="6"/>
    <rect x="8" y="8" width="84" height="130" rx="8" fill="none" stroke="#1a202c" stroke-width="3"/>
    <circle cx="50" cy="155" r="5" fill="#1a202c"/>
  </g>

  <!-- Center Left - Warranty/Shield -->
  <g opacity="0.06" transform="translate(120, 600)">
    <path d="M 50 0 L 100 30 L 100 80 Q 50 110 0 80 L 0 30 Z" fill="none" stroke="#1a202c" stroke-width="6"/>
    <path d="M 35 50 L 50 65 L 65 45" fill="none" stroke="#1a202c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Top Left - Calendar/Maintenance -->
  <g opacity="0.07" transform="translate(150, 150)">
    <rect x="0" y="0" width="120" height="140" rx="6" fill="none" stroke="#1a202c" stroke-width="6"/>
    <line x1="0" y1="40" x2="120" y2="40" stroke="#1a202c" stroke-width="4"/>
    <circle cx="30" cy="80" r="8" fill="none" stroke="#1a202c" stroke-width="4"/>
    <circle cx="60" cy="80" r="8" fill="none" stroke="#1a202c" stroke-width="4"/>
    <circle cx="90" cy="80" r="8" fill="none" stroke="#1a202c" stroke-width="4"/>
  </g>

  <!-- Bottom Center - Asset Box/Storage -->
  <g opacity="0.065" transform="translate(1550, 850)">
    <rect x="0" y="0" width="200" height="160" rx="8" fill="none" stroke="#1a202c" stroke-width="7"/>
    <line x1="0" y1="50" x2="200" y2="50" stroke="#1a202c" stroke-width="5"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#1a202c" stroke-width="5"/>
    <circle cx="50" cy="75" r="6" fill="#1a202c"/>
    <circle cx="100" cy="75" r="6" fill="#1a202c"/>
    <circle cx="150" cy="75" r="6" fill="#1a202c"/>
  </g>

  <!-- Center Right - Gear/Settings -->
  <g opacity="0.06" transform="translate(1650, 400)">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#1a202c" stroke-width="6"/>
    <circle cx="50" cy="50" r="20" fill="none" stroke="#1a202c" stroke-width="5"/>
    <g stroke="#1a202c" stroke-width="6" stroke-linecap="round">
      <line x1="50" y1="0" x2="50" y2="20"/>
      <line x1="50" y1="80" x2="50" y2="100"/>
      <line x1="0" y1="50" x2="20" y2="50"/>
      <line x1="80" y1="50" x2="100" y2="50"/>
    </g>
  </g>

  <!-- Subtle Grid Pattern in Background -->
  <defs>
    <pattern id="subtleGrid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#cbd5e0" stroke-width="1" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#subtleGrid)" />
</svg>
