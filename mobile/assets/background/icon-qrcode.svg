<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- QR Code Icon -->
  <g stroke="currentColor" stroke-width="6">
    <!-- Top-left square -->
    <rect x="20" y="20" width="50" height="50"/>
    <rect x="30" y="30" width="30" height="30" fill="currentColor"/>
    
    <!-- Top-right square -->
    <rect x="130" y="20" width="50" height="50"/>
    <rect x="140" y="30" width="30" height="30" fill="currentColor"/>
    
    <!-- Bottom-left square -->
    <rect x="20" y="130" width="50" height="50"/>
    <rect x="30" y="140" width="30" height="30" fill="currentColor"/>
    
    <!-- Pattern dots -->
    <circle cx="100" cy="100" r="4" fill="currentColor"/>
    <circle cx="130" cy="100" r="4" fill="currentColor"/>
    <circle cx="100" cy="130" r="4" fill="currentColor"/>
    <circle cx="130" cy="130" r="4" fill="currentColor"/>
  </g>
</svg>
