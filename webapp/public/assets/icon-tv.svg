<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#374151" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Screen frame -->
  <rect x="8" y="14" width="84" height="58" rx="6"/>
  <!-- Screen area -->
  <rect x="14" y="20" width="72" height="46" rx="3" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <!-- Stand base -->
  <line x1="50" y1="72" x2="50" y2="86"/>
  <line x1="32" y1="86" x2="68" y2="86"/>
  <!-- Stand left / right -->
  <line x1="32" y1="86" x2="40" y2="72"/>
  <line x1="68" y1="86" x2="60" y2="72"/>
  <!-- Speaker dots -->
  <circle cx="80" cy="43" r="2.5" fill="#374151"/>
  <circle cx="86" cy="43" r="2.5" fill="#374151"/>
</svg>
